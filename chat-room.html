<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Chat Room — Dead Drop</title>
<link rel="icon" type="image/png" sizes="32x32" href="/img/deaddrop-favicon-32.png" />
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="/lib/tailwind.min.css" />
<link rel="stylesheet" href="/fx.css" />
<style>
  html, body { height: 100%; }
  body { background: #05060A; display: flex; flex-direction: column; }
  .msg-bubble { word-break: break-word; }
  @keyframes pulse-dot { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  .pulse-dot { animation: pulse-dot 1.6s ease-in-out infinite; }
</style>
</head>
<body class="font-sans text-white antialiased">

<header class="sticky top-0 z-40 backdrop-blur-xl bg-void-950/85 border-b border-white/5">
  <div class="max-w-3xl mx-auto px-3 md:px-4 h-14 flex items-center justify-between gap-2 md:gap-3">
    <a href="/chat" data-i18n-aria-label="room.backAria" aria-label="Zurück zu Rooms" class="shrink-0 inline-flex items-center justify-center w-10 h-10 rounded-lg hover:bg-void-800 text-white/60 hover:text-white">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <div class="flex-1 min-w-0 text-center">
      <div id="room-name" class="font-600 text-sm md:text-base truncate">—</div>
      <div id="room-meta" class="text-[10px] font-mono text-white/40 truncate">
        <span id="room-members">—</span> · <span id="room-expiry">—</span>
      </div>
    </div>
    <button id="share-btn" data-i18n-aria-label="room.shareAria" data-i18n-title="room.shareAria" aria-label="Share-Link kopieren" title="Share-Link kopieren" class="shrink-0 inline-flex items-center justify-center w-10 h-10 rounded-lg hover:bg-void-800 text-white/70 hover:text-neon-500">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/>
      </svg>
    </button>
  </div>
  <div id="share-toast" class="hidden absolute top-14 left-1/2 -translate-x-1/2 mt-2 px-3 py-1.5 rounded-full bg-neon-500 text-void-950 text-xs font-mono" data-i18n="room.shareToast">
    ✓ Link kopiert
  </div>
</header>

<!-- Gate -->
<div id="gate" class="hidden flex-1 flex items-center justify-center p-6 text-center">
  <div>
    <div class="inline-flex items-center gap-2 px-3 py-1 text-xs font-mono rounded-full bg-neon-500/10 text-neon-500 border border-neon-500/30 mb-4">
      <span class="w-1.5 h-1.5 rounded-full bg-neon-500 pulse-dot"></span>
      <span data-i18n="room.gate.chip">Wallet erforderlich</span>
    </div>
    <h2 class="font-sans text-2xl font-600 mb-3" data-i18n="room.gate.title">Du brauchst ein Wallet</h2>
    <p class="text-white/60 mb-6 max-w-sm" data-i18n="room.gate.sub">Dead Drop Chat ist wallet-gebunden. Verbinde MetaMask oder ein kompatibles Wallet, um diesem Room beizutreten.</p>
    <button data-action="connect-wallet" class="px-6 py-3 rounded-full bg-neon-500 text-void-950 font-bold hover:bg-neon-600 transition" data-i18n="room.gate.connect">Wallet verbinden</button>
  </div>
</div>

<!-- Error screen -->
<div id="err-screen" class="hidden flex-1 flex items-center justify-center p-6 text-center">
  <div>
    <div class="text-5xl mb-4">⚠</div>
    <h2 class="font-sans text-2xl font-600 mb-3" data-i18n="room.err.title">Room nicht verfügbar</h2>
    <p id="err-text" class="text-white/60 mb-6 max-w-sm">—</p>
    <a href="/chat" class="px-5 py-2.5 rounded-full border border-white/20 hover:border-neon-500/50 text-sm font-mono transition" data-i18n="room.err.back">zurück zur Room-Liste</a>
  </div>
</div>

<!-- Main chat area -->
<main id="chat-panel" class="hidden flex-1 flex flex-col overflow-hidden" style="min-height: 100dvh;">
  <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-6 space-y-2 max-w-3xl mx-auto w-full" style="scroll-padding-bottom: 120px;">
    <div id="chat-loading" class="text-center text-white/40 font-mono text-sm" data-i18n="room.loadHistory">// lade Verlauf …</div>
  </div>

  <div id="chat-status" class="hidden px-4 py-1 text-center text-[11px] font-mono text-yellow-400 bg-yellow-500/5 border-t border-yellow-500/20">—</div>

  <!-- Sticky input bar — keyboard-friendly on mobile -->
  <div class="sticky bottom-0 left-0 right-0 border-t border-white/5 bg-void-950 z-30" style="padding-bottom: env(safe-area-inset-bottom);">
    <div class="max-w-3xl mx-auto p-2.5 md:p-3 flex items-end gap-2">
      <button id="chat-attach-btn" data-i18n-aria-label="room.attachAria" aria-label="Drop anhängen" title="Drop anhängen" class="shrink-0 w-11 h-11 md:w-auto md:h-auto md:px-3 md:py-3 rounded-xl bg-void-800 border border-neon-500/30 text-neon-500 hover:bg-neon-500/10 hover:border-neon-500/60 transition grid place-items-center">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
        </svg>
      </button>
      <textarea id="msg-input" rows="1" maxlength="4000" data-i18n-placeholder="room.inputPh" placeholder="Nachricht schreiben …"
        class="flex-1 min-w-0 px-3 md:px-4 py-2.5 md:py-3 rounded-xl bg-void-800 border border-white/10 focus:outline-none focus:border-neon-500/40 resize-none font-sans leading-relaxed"
        style="max-height: 200px; font-size: 16px;"></textarea>
      <button id="send-btn" data-i18n-aria-label="room.sendAria" aria-label="Senden" class="shrink-0 w-11 h-11 md:w-auto md:h-auto md:px-5 md:py-3 rounded-xl bg-neon-500 text-void-950 font-bold hover:bg-neon-600 disabled:opacity-40 disabled:cursor-not-allowed transition grid place-items-center md:inline-flex md:items-center">
        <svg class="md:hidden" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
        <span class="hidden md:inline" data-i18n="room.send">Senden</span>
      </button>
    </div>
  </div>
</main>
<script src="/lib/sha3.min.js" integrity="sha384-+JAeTqUiH9WuByObPHouP4rQKYUTLQ9AQW4HHJZ4uNmkA2+nkDpbssQNGsVXnJpe" crossorigin="anonymous"></script>
<script src="/ref-capture.js" defer></script>
<script src="/auth.js"></script>
<script src="/panic.js" defer></script>
<script src="/chat-room.js"></script>
<script src="/i18n.js"></script>
</body>
</html>
