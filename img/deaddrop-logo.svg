<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.8"/>
    </filter>
    <filter id="chalk2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="13" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.8"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- outer chalk haze (softer, wider) -->
  <g stroke="#00FF9D" stroke-width="7" stroke-linecap="round" opacity="0.22" filter="url(#chalk)">
    <line x1="13" y1="14" x2="51" y2="50"/>
    <line x1="51" y1="14" x2="13" y2="50"/>
  </g>

  <!-- main chalk strokes -->
  <g stroke="#00FF9D" stroke-width="4.5" stroke-linecap="round" filter="url(#chalk)">
    <line x1="14" y1="15" x2="50" y2="49"/>
    <line x1="50" y1="15" x2="14" y2="49"/>
  </g>

  <!-- secondary micro-texture scratches (thinner, uneven) -->
  <g stroke="#00FF9D" stroke-width="1.4" stroke-linecap="round" opacity="0.55" filter="url(#chalk2)">
    <line x1="15" y1="16" x2="49" y2="48"/>
    <line x1="49" y1="16" x2="15" y2="48"/>
  </g>
</svg>
