<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7" result="noise">
        <animate attributeName="seed" values="7;41;13;91;27;5;63;19;3;77;11;7" dur="3.1s" repeatCount="indefinite" calcMode="discrete"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3"/>
    </filter>
    <filter id="chalk2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="2" seed="13" result="noise">
        <animate attributeName="seed" values="13;97;31;5;71;23;89;11;47;17;13" dur="1.9s" repeatCount="indefinite" calcMode="discrete"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
  </defs>

  <style>
    /* unregelmäßige Flicker — asymmetrische Keyframes, primzahlige Dauern, unterschiedliche Easings */
    .s1 {
      animation: flicker-a 5.3s cubic-bezier(.7,.02,.3,1) infinite;
    }
    .s2 {
      animation: flicker-b 3.7s cubic-bezier(.4,.1,.8,.3) infinite;
      animation-delay: -1.1s;
    }
    .haze {
      animation: breathe 7.1s cubic-bezier(.55,.1,.45,.9) infinite;
    }
    .micro {
      animation: glitch 2.3s steps(6, end) infinite;
      animation-delay: -0.4s;
    }

    /* Flicker A: lang-hell, kurz-dunkel, lang-hell, kurzer blink, lang-hell */
    @keyframes flicker-a {
      0%   { opacity: 0.95; }
      7%   { opacity: 0.35; }
      10%  { opacity: 0.98; }
      29%  { opacity: 1;    }
      32%  { opacity: 0.42; }
      34%  { opacity: 1;    }
      58%  { opacity: 1;    }
      60%  { opacity: 0.55; }
      63%  { opacity: 0.98; }
      100% { opacity: 0.95; }
    }
    /* Flicker B: anderes Rhythmus-Muster — out-of-sync mit A */
    @keyframes flicker-b {
      0%   { opacity: 1;    }
      13%  { opacity: 0.48; }
      16%  { opacity: 1;    }
      44%  { opacity: 1;    }
      47%  { opacity: 0.3;  }
      49%  { opacity: 0.95; }
      72%  { opacity: 0.95; }
      78%  { opacity: 0.5;  }
      80%  { opacity: 1;    }
      100% { opacity: 1;    }
    }
    /* Breathe: langsam, sanft, nicht sinusförmig */
    @keyframes breathe {
      0%   { opacity: 0.14; }
      23%  { opacity: 0.38; }
      41%  { opacity: 0.22; }
      67%  { opacity: 0.42; }
      84%  { opacity: 0.18; }
      100% { opacity: 0.14; }
    }
    /* Glitch: staccato, nicht sanft */
    @keyframes glitch {
      0%   { opacity: 0.3; }
      16%  { opacity: 0.75; }
      33%  { opacity: 0.35; }
      50%  { opacity: 0.6;  }
      66%  { opacity: 0.25; }
      83%  { opacity: 0.7;  }
      100% { opacity: 0.3; }
    }
  </style>

  <!-- outer chalk haze -->
  <g stroke="#00FF9D" stroke-width="7.5" stroke-linecap="round" class="haze" filter="url(#chalk)">
    <line x1="13" y1="14" x2="51" y2="50"/>
    <line x1="51" y1="14" x2="13" y2="50"/>
  </g>

  <!-- main chalk strokes — je eigene Flicker-Rhythmik -->
  <g stroke="#00FF9D" stroke-width="5" stroke-linecap="round" filter="url(#chalk)">
    <line x1="14" y1="15" x2="50" y2="49" class="s1"/>
    <line x1="50" y1="15" x2="14" y2="49" class="s2"/>
  </g>

  <!-- micro-texture — staccato -->
  <g stroke="#00FF9D" stroke-width="1.6" stroke-linecap="round" class="micro" filter="url(#chalk2)">
    <line x1="15" y1="16" x2="49" y2="48"/>
    <line x1="49" y1="16" x2="15" y2="48"/>
  </g>
</svg>
