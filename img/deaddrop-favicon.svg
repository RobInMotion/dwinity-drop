<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <filter id="chalk" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2" numOctaves="2" seed="7" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.3"/>
    </filter>
  </defs>
  <rect width="32" height="32" fill="#0a0a0a"/>
  <g stroke="#00FF9D" stroke-width="3" stroke-linecap="round" filter="url(#chalk)">
    <line x1="7" y1="8" x2="25" y2="24"/>
    <line x1="25" y1="8" x2="7" y2="24"/>
  </g>
</svg>
